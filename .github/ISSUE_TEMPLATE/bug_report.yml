name: Bug report
description: Report a bug or unexpected behavior
labels: [bug]
body:
  - type: dropdown
    attributes:
      label: RouterOS version
      options: [7.x, 6.49.x, Other]
  - type: input
    attributes:
      label: Package version
  - type: textarea
    attributes:
      label: Steps to reproduce
  - type: textarea
    attributes:
      label: Expected vs actual behavior

