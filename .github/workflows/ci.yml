name: Tests & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - { php: '8.2', laravel: '11.*', testbench: '^9.0' }
          - { php: '8.3', laravel: '11.*', testbench: '^9.0' }
          - { php: '8.3', laravel: '12.*', testbench: '^10.0' }
          - { php: '8.3', laravel: '13.*', testbench: '^11.0' }

    name: PHP ${{ matrix.php }} / Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@7c071dfe9dc99bdf297fa79cb49ea005b9fcadbc
        with:
          php-version: ${{ matrix.php }}
          extensions: sockets, openssl
          coverage: none
          tools: composer:v2

      - name: Install dependencies
        run: |
          composer require \
            "laravel/framework:${{ matrix.laravel }}" \
            "orchestra/testbench:${{ matrix.testbench }}" \
            --no-update --no-interaction
          composer update --no-interaction --prefer-dist --no-progress

      - name: Run Pest
        run: ./vendor/bin/pest --no-coverage
