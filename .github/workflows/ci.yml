name: Tests & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.1', '8.2', '8.3']
        laravel: ['10.*', '11.*', '12.*']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: sockets, openssl
          coverage: xdebug

      - name: Install dependencies
        run: composer require "laravel/framework:${{ matrix.laravel }}" --no-update && composer install

      - name: Run Pest tests
        run: ./vendor/bin/pest --coverage

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: PHP CS Fixer
        run: composer require friendsofphp/php-cs-fixer --dev && ./vendor/bin/php-cs-fixer fix --dry-run